<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="dark" />
<meta name="theme-color" content="#0A0616" />

<title data-i18n="page.title">BITO GAMES — Két univerzum</title>
<meta name="description" data-i18n-attr="content:page.desc" content="Két univerzum, egy független indie stúdió: NOVA szimulációk és retró pixel-világok. Natív játékok Windowsra, macOS-re és Linuxra." />
<link rel="canonical" href="https://sandorbito.com/" />

<meta property="og:type" content="website" />
<meta property="og:title" content="BITO GAMES — Két univerzum" />
<meta property="og:description" content="NOVA szimulációk és retró pixel-világok." />
<meta property="og:url" content="https://sandorbito.com/" />
<meta property="og:image" content="https://sandorbito.com/assets/branding/BITO_GAMES_logo_v1_alpha.png" />

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests;" />
<meta name="referrer" content="strict-origin-when-cross-origin" />
<meta http-equiv="X-Content-Type-Options" content="nosniff" />
<meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()" />

<style>
  *,*::before,*::after{ box-sizing:border-box; }
  :root{
    --bg:#0A0616; --bg2:#170D2E; --panel:rgba(30,16,60,.55);
    --violet:#b26bff; --violet-dim:rgba(178,107,255,.30); --glow:rgba(178,107,255,.45);
    --text:#EDE7FA; --muted:#a698c4;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  }
  html,body{ margin:0; padding:0; }
  body{
    background:radial-gradient(120% 90% at 50% 0,var(--bg2) 0%,var(--bg) 60%) fixed,var(--bg);
    color:var(--text); font-family:var(--mono); line-height:1.6;
    min-height:100dvh; display:flex; flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:inherit; }
  .wrap{ width:min(1100px,92%); margin:0 auto; }

  header{ padding:1.25rem 0 .5rem; }
  .lang{ display:flex; gap:.5rem; align-items:center; justify-content:flex-end; }
  .lang button{
    font:inherit; font-size:.85rem; letter-spacing:.1em; color:var(--muted);
    background:none; border:0; cursor:pointer; padding:.3rem .45rem; border-radius:6px;
    transition:color .2s,background .2s;
  }
  .lang button:hover{ color:var(--text); }
  .lang button.on{ color:var(--violet); background:rgba(178,107,255,.10); }
  .lang span{ color:#4a3e63; }

  .hero{ text-align:center; padding:2.5rem 0 1rem; }
  .eyebrow{ font-size:.78rem; letter-spacing:.34em; color:var(--violet); text-transform:uppercase; margin:0 0 1rem; }
  h1{
    margin:0 0 .9rem; font-size:clamp(1.9rem,7vw,3.6rem); line-height:1.1;
    letter-spacing:.04em; font-weight:700; text-shadow:0 0 26px var(--glow);
  }
  .lede{ margin:0 auto; max-width:52ch; color:var(--muted); font-size:clamp(.95rem,2.4vw,1.08rem); }

  .universes{ display:grid; gap:clamp(1.1rem,3vw,1.9rem); padding:2.5rem 0 1rem; grid-template-columns:1fr; }
  @media(min-width:820px){ .universes{ grid-template-columns:1fr 1fr; } }
  .u{
    display:block; text-decoration:none; background:var(--panel);
    border:1px solid var(--violet-dim); border-radius:16px;
    padding:clamp(.9rem,2.5vw,1.3rem); text-align:center;
    transition:transform .25s ease,border-color .25s ease,box-shadow .25s ease;
  }
  .u:hover,.u:focus-visible{ transform:translateY(-6px); border-color:var(--violet); box-shadow:0 14px 40px -12px var(--glow); }
  .u:focus-visible{ outline:2px solid var(--violet); outline-offset:3px; }
  .u img{ display:block; width:100%; height:auto; border-radius:10px; }
  .u .tag{ display:block; margin-top:.9rem; color:var(--muted); font-size:.92rem; }
  .u .go{ display:inline-block; margin-top:.6rem; color:var(--violet); letter-spacing:.16em; font-size:.85rem; transition:transform .25s ease; }
  .u:hover .go{ transform:translateX(5px); }

  footer{ margin-top:auto; padding:3rem 0 2.5rem; text-align:center; }
  .studio{ display:inline-block; text-decoration:none; padding:.6rem; transition:transform .25s ease,filter .25s ease; }
  .studio:hover,.studio:focus-visible{ transform:translateY(-3px); filter:drop-shadow(0 0 22px var(--glow)); }
  .studio:focus-visible{ outline:2px solid var(--violet); outline-offset:4px; border-radius:12px; }
  .studio img{ display:block; width:min(230px,62vw); height:auto; margin:0 auto; }
  .visit{ margin:.9rem 0 0; color:var(--violet); font-size:.9rem; letter-spacing:.14em; }
  .copy{ margin:1.4rem 0 0; color:#6d5f8c; font-size:.8rem; letter-spacing:.06em; }

  @media(prefers-reduced-motion:reduce){ *{ transition:none !important; } }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <nav class="lang" role="group" aria-label="Nyelv / Language">
      <button type="button" data-lang="hu">HU</button><span aria-hidden="true">|</span>
      <button type="button" data-lang="en">EN</button><span aria-hidden="true">|</span>
      <button type="button" data-lang="zh">中文</button>
    </nav>
  </div>
</header>

<main class="wrap">
  <section class="hero">
    <p class="eyebrow" data-i18n="hero.eyebrow">Független indie stúdió</p>
    <h1 data-i18n="hero.title">KÉT UNIVERZUM</h1>
    <p class="lede" data-i18n="hero.lede">Mély rendszerek és meleg, retró pixel-világok. Natív játékok Windowsra, macOS-re és Linuxra.</p>
  </section>

  <section class="universes" aria-label="Univerzumok">
    <a class="u" href="https://bitogames.com/#nova">
      <img src="assets/branding/BITO_GAMES_NOVA_UNIVERSE_banner_v1_alpha.png" alt="NOVA Universe" loading="lazy" decoding="async" />
      <span class="tag" data-i18n="nova.tag">Prémium sci-fi szimulációk</span>
      <span class="go" data-i18n="cta">BELÉPÉS →</span>
    </a>
    <a class="u" href="https://bitogames.com/#pixel">
      <img src="assets/branding/BITO_GAMES_PIXEL_ART_UNIVERSE_banner_v1_alpha.png" alt="Pixel Art Universe" loading="lazy" decoding="async" />
      <span class="tag" data-i18n="pixel.tag">Meleg, retró pixel-világok</span>
      <span class="go" data-i18n="cta">BELÉPÉS →</span>
    </a>
  </section>
</main>

<footer>
  <div class="wrap">
    <a class="studio" href="https://bitogames.com" aria-label="BITO GAMES — bitogames.com">
      <img src="assets/branding/BITO_GAMES_logo_v1_alpha.png" alt="BITO GAMES" />
    </a>
    <p class="visit" data-i18n="footer.visit">bitogames.com →</p>
    <p class="copy" data-i18n="footer.copy">© 2026 BITO GAMES</p>
  </div>
</footer>

<script>
(function(){
  var T = {
    hu:{
      "page.title":"BITO GAMES — Két univerzum",
      "page.desc":"Két univerzum, egy független indie stúdió: NOVA szimulációk és retró pixel-világok. Natív játékok Windowsra, macOS-re és Linuxra.",
      "hero.eyebrow":"Független indie stúdió",
      "hero.title":"KÉT UNIVERZUM",
      "hero.lede":"Mély rendszerek és meleg, retró pixel-világok. Natív játékok Windowsra, macOS-re és Linuxra.",
      "nova.tag":"Prémium sci-fi szimulációk",
      "pixel.tag":"Meleg, retró pixel-világok",
      "cta":"BELÉPÉS →",
      "footer.visit":"bitogames.com →",
      "footer.copy":"© 2026 BITO GAMES"
    },
    en:{
      "page.title":"BITO GAMES — Two universes",
      "page.desc":"Two universes, one independent indie studio: NOVA simulations and retro pixel worlds. Native games for Windows, macOS and Linux.",
      "hero.eyebrow":"Independent indie studio",
      "hero.title":"TWO UNIVERSES",
      "hero.lede":"Deep systems and warm retro pixel worlds. Native games for Windows, macOS and Linux.",
      "nova.tag":"Premium sci-fi simulations",
      "pixel.tag":"Warm retro pixel worlds",
      "cta":"ENTER →",
      "footer.visit":"bitogames.com →",
      "footer.copy":"© 2026 BITO GAMES"
    },
    zh:{
      "page.title":"BITO GAMES — 两个宇宙",
      "page.desc":"两个宇宙，一家独立工作室：NOVA 模拟与复古像素世界。为 Windows、macOS 和 Linux 打造的原生游戏。",
      "hero.eyebrow":"独立游戏工作室",
      "hero.title":"两个宇宙",
      "hero.lede":"深层系统与温暖的复古像素世界。为 Windows、macOS 和 Linux 打造的原生游戏。",
      "nova.tag":"高端科幻模拟",
      "pixel.tag":"温暖的复古像素世界",
      "cta":"进入 →",
      "footer.visit":"bitogames.com →",
      "footer.copy":"© 2026 BITO GAMES"
    }
  };
  function apply(lang){
    var d = T[lang] || T.hu;
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-i18n]').forEach(function(el){
      var v = d[el.getAttribute('data-i18n')]; if(v!=null) el.textContent = v;
    });
    document.querySelectorAll('[data-i18n-attr]').forEach(function(el){
      el.getAttribute('data-i18n-attr').split(',').forEach(function(pair){
        var p = pair.split(':'), v = d[p[1]]; if(v!=null) el.setAttribute(p[0].trim(), v);
      });
    });
    if(d['page.title']) document.title = d['page.title'];
    document.querySelectorAll('.lang button').forEach(function(b){
      var on = b.getAttribute('data-lang') === lang;
      b.classList.toggle('on', on);
      b.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
    try{ localStorage.setItem('bito_lang', lang); }catch(e){}
  }
  document.querySelectorAll('.lang button').forEach(function(b){
    b.addEventListener('click', function(){ apply(b.getAttribute('data-lang')); });
  });
  var saved = null;
  try{ saved = localStorage.getItem('bito_lang'); }catch(e){}
  var auto = (navigator.language||'hu').slice(0,2).toLowerCase();
  apply(saved || (T[auto] ? auto : 'hu'));
})();
</script>
</body>
</html>
